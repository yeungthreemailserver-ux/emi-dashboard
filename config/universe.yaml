# Electronic Market Intelligence — Company & Supply-Chain Universe
# Tiers are ordered upstream (materials) -> downstream (end-markets / demand drivers).
#
# listing:
#   us_domestic = files 10-K/10-Q  -> full quarterly XBRL via EDGAR (best coverage)
#   adr         = foreign private issuer, files 20-F/6-K -> annual-only XBRL via EDGAR
#   foreign     = no SEC filings -> IR-page / manual ingestion (later phase)
#
# end_markets vocabulary: ai_datacenter, mobile, auto, industrial, consumer, compute,
#   server, networking, storage, power, rf, semicap, materials, memory, drone, defense

meta:
  schema_version: 1
  primary_lens: corporate_strategy
  notes: >
    EDGAR XBRL works best for us_domestic filers. ADRs are annual-only; foreign names
    need IR-page ingestion. Tickers are resolved to SEC CIKs automatically at ingest time.

tiers:
  - id: materials
    name: Materials, Gases & Wafers
    key_signals: [wafer_shipments, materials_revenue, capex_pass_through]
    companies:
      - {name: Entegris,            ticker: ENTG, region: US, listing: us_domestic, end_markets: [semicap, materials]}
      - {name: DuPont,              ticker: DD,   region: US, listing: us_domestic, end_markets: [materials]}
      - {name: Air Products,        ticker: APD,  region: US, listing: us_domestic, end_markets: [materials]}
      - {name: Linde,               ticker: LIN,  region: US, listing: us_domestic, end_markets: [materials]}
      - {name: Shin-Etsu Chemical,  ticker: "4063.T", region: JP, listing: foreign, end_markets: [materials]}
      - {name: SUMCO,               ticker: "3436.T", region: JP, listing: foreign, end_markets: [materials]}

