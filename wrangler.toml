# Cloudflare Pages config for the EMI static site.
# `npx wrangler pages deploy` (from the project root) publishes web/ to the
# emi-dashboard Pages project -> https://emi-dashboard.pages.dev
# web/_redirects routes the site root to /home.html; .html is auto-normalised.
name = "emi-dashboard"
pages_build_output_dir = "./web"
compatibility_date = "2026-06-24"
